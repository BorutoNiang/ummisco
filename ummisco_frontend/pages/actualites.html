<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Actualites UMMISCO</title>
<link rel="stylesheet" href="../css/global.css"/>
<style>
.page-actu{padding:40px 0 64px}
.actu-layout{display:grid;grid-template-columns:1fr 280px;gap:40px;align-items:start}
@media(max-width:900px){.actu-layout{grid-template-columns:1fr}}
.actu-list{display:flex;flex-direction:column}
.actu-row{display:grid;grid-template-columns:200px 1fr;gap:24px;padding:28px 0;border-bottom:1px solid var(--c-border);align-items:start}
.actu-row:last-child{border-bottom:none}
@media(max-width:600px){.actu-row{grid-template-columns:1fr}}
.actu-row-img{width:200px;height:140px;object-fit:cover;border-radius:var(--radius-sm);display:block}
.actu-row-img-ph{width:200px;height:140px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--c-primary),#0055bb);display:flex;align-items:center;justify-content:center}
.actu-row-title{font-size:1rem;font-weight:700;color:var(--c-primary);margin-bottom:6px;cursor:pointer}
.actu-row-title:hover{text-decoration:underline}
.actu-row-date{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--c-text3);margin-bottom:8px}
.actu-row-text{font-size:13.5px;color:var(--c-text2);line-height:1.7}
.actu-row-more{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:var(--c-primary);margin-top:8px;cursor:pointer;font-weight:500}
.actu-row-more:hover{text-decoration:underline}
.search-box{width:100%;background:#fff;border:1px solid var(--c-border);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;color:var(--c-text);margin-bottom:20px}
.search-box:focus{border-color:var(--c-primary);outline:none}
.widget{background:#fff;border:1px solid var(--c-border);border-radius:var(--radius-md);overflow:hidden;margin-bottom:20px}
.widget-header{background:var(--c-primary);color:#fff;padding:10px 14px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:8px}
.widget-body{padding:12px 14px}
.widget-link{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid var(--c-border);font-size:13px;color:var(--c-text2);transition:color .18s}
.widget-link:last-child{border-bottom:none}
.widget-link:hover{color:var(--c-primary)}
.evt-item{padding:8px 0;border-bottom:1px solid var(--c-border);font-size:13px}
.evt-item:last-child{border-bottom:none}
.evt-date{font-size:11px;font-weight:700;color:var(--c-accent);text-transform:uppercase;margin-bottom:2px}
</style>
</head>
<body>
<div class="page-header-inst"><div class="container"><h1>Actualites</h1><p>Vie du laboratoire, conferences, seminaires</p></div></div>
<div class="page-actu"><div class="container"><div class="actu-layout">
<div>
<input class="search-box" type="search" id="search" placeholder="Rechercher..." oninput="renderNews()"/>
<div class="actu-list" id="news-list">
<div class="skeleton" style="height:160px;margin-bottom:20px"></div>
<div class="skeleton" style="height:160px;margin-bottom:20px"></div>
<div class="skeleton" style="height:160px"></div>
</div>
<div style="text-align:center;margin-top:24px;display:none" id="load-more">
<button class="btn btn--primary" onclick="loadMore()">Charger plus</button>
</div>
</div>
<div>
<div class="widget">
<div class="widget-header">Evenements a venir</div>
<div class="widget-body" id="events-list"><div class="skeleton" style="height:44px;margin-bottom:8px"></div><div class="skeleton" style="height:44px"></div></div>
</div>
<div class="widget">
<div class="widget-header">Liens utiles</div>
<div class="widget-body">
<a class="widget-link" href="https://ummisco.ird.fr" target="_blank">UMMISCO Global (IRD)</a>
<a class="widget-link" href="https://scholar.google.com" target="_blank">Google Scholar</a>
<a class="widget-link" href="https://ucad.sn" target="_blank">UCAD</a>
<a class="widget-link" href="login.html">Espace membres</a>
</div>
</div>
</div>
</div></div></div>
<div class="modal-overlay" id="modal-detail">
<div class="modal" style="max-width:700px">
<div class="modal-header">
<span class="modal-title" id="detail-title" style="font-size:.95rem;max-width:90%;line-height:1.3"></span>
<div class="modal-close" onclick="closeDetail()">X</div>
</div>
<div id="detail-body"></div>
</div>
</div>
<script src="../js/api.js"></script>
<script src="../js/nav.js"></script>
<script>
initNav({active:'actualites',base:'../'});
initFooter({base:'../'});
var BASE='http://localhost:8000';
var DEMO=[
{id:1,titre:'MISS - ABMS 2019',image_url:BASE+'/uploads/actus/actu-miss-abms.jpg',date_publication:'2022-06-23T09:35:00',contenu:'Multi-platform International Summer School on Agent-Based Modelling and Simulation for Renewable Resources Management. This 2-week summer school is about learning the different skills required for building agent-based models for renewable resources management. The first week focuses on general background lectures and learning of UML and platforms. The second week is dedicated to the design and implementation of a model on a platform.'},
{id:2,titre:"Appel 2019 a candidature du PDI",image_url:BASE+'/uploads/actus/actu-appel-pdi.jpg',date_publication:'2022-01-14T12:40:00',contenu:"L'appel 2019 pour le PROGRAMME DOCTORAL INTERNATIONAL (PDI) Modelisation des Systemes Complexes (MSC) est lance. Ce programme permettra de financer 1 a 2 contrats doctoraux au Nord et 9 a 12 contrats doctoraux au Sud. 21 juin 2019 : Date limite de depot du dossier complet. 1-11 juillet 2019 : Auditions a distance des candidats declares admissibles."},
{id:3,titre:"Atelier sur la mobilite des pecheurs",image_url:BASE+'/uploads/actus/actu-ateliers-pecheurs.jpg',date_publication:'2021-06-29T13:44:00',contenu:"Timothee Brochier anime la semaine du 20 mai 2019 un atelier sur la mobilite des pecheurs dans le cadre de la recherche sur la dynamique des pecheries. Cet atelier prendra place dans la salle multimedia du CRENT, sur le campus de l'ESP."},
{id:4,titre:"Seminaire sur la modelisation des systemes complexes",image_url:null,date_publication:'2021-06-29T11:37:00',contenu:"Dans la semaine du 20 au 24 mai 2019, Mme Edith Perrier presentera un seminaire d'introduction a la modelisation des systemes complexes aux etudiants du Master SYSCOM, dans la salle multimedia du CRENT, sur le campus de l'ESP."}
];
var DEMO_EVT=[{titre:'Conference epidemio Dakar',date_debut:'2025-11-15T09:00:00',lieu:'ESP/UCAD'},{titre:'Seminaire IoT mensuel',date_debut:'2025-10-08T14:00:00',lieu:'Salle A12'}];
var allNews=[],displayCount=10;
function imgSrc(u){return !u?null:u.startsWith('http')?u:BASE+u}
async function init(){try{var d=await api.get('/actualites/?limit=100');allNews=d&&d.length?d:DEMO;}catch(e){allNews=DEMO;}renderNews();loadEvents();}
function renderNews(){
  var q=document.getElementById('search').value.toLowerCase();
  var filtered=allNews.filter(function(n){return !q||n.titre.toLowerCase().includes(q)||(n.contenu||'').toLowerCase().includes(q);});
  document.getElementById('load-more').style.display=filtered.length>displayCount?'block':'none';
  var list=document.getElementById('news-list');
  if(!filtered.length){list.innerHTML='<p style="padding:32px;text-align:center;color:var(--c-text3)">Aucune actualite trouvee.</p>';return;}
  list.innerHTML=filtered.slice(0,displayCount).map(function(n){
    var src=imgSrc(n.image_url);
    var imgHtml=src?'<img src="'+src+'" class="actu-row-img" onerror="this.style.display=\'none\'">'
      :'<div class="actu-row-img-ph"></div>';
    return '<div class="actu-row"><div>'+imgHtml+'</div><div>'
      +'<div class="actu-row-title" onclick="openDetail('+n.id+')">'+n.titre+'</div>'
      +'<div class="actu-row-date">'+formatDateTime(n.date_publication)+'</div>'
      +'<div class="actu-row-text">'+(n.contenu||'')+'</div>'
      +'<span class="actu-row-more" onclick="openDetail('+n.id+')">Lire la suite</span>'
      +'</div></div>';
  }).join('');
}
function loadMore(){displayCount+=5;renderNews();}
async function loadEvents(){var evts=DEMO_EVT;try{evts=await api.get('/evenements/?limit=5');}catch(e){}
  document.getElementById('events-list').innerHTML=evts.map(function(e){
    return '<div class="evt-item"><div class="evt-date">'+formatDate(e.date_debut)+'</div><div style="font-weight:500">'+truncate(e.titre,50)+'</div>'+(e.lieu?'<div style="font-size:11px;color:var(--c-text3)">'+e.lieu+'</div>':'')+'</div>';
  }).join('');
}
function openDetail(id){var n=allNews.find(function(x){return x.id===id;});if(!n)return;var src=imgSrc(n.image_url);
  document.getElementById('detail-title').textContent=n.titre;
  document.getElementById('detail-body').innerHTML='<div style="font-size:12px;color:var(--c-text3);margin-bottom:14px">'+formatDateTime(n.date_publication)+'</div>'
    +(src?'<img src="'+src+'" style="width:100%;max-height:260px;object-fit:cover;border-radius:6px;margin-bottom:16px"/>'   :'')
    +'<p style="font-size:14px;color:var(--c-text2);line-height:1.8">'+(n.contenu||'')+'</p>';
  document.getElementById('modal-detail').classList.add('open');
}
function closeDetail(){document.getElementById('modal-detail').classList.remove('open');}
document.getElementById('modal-detail').addEventListener('click',function(e){if(e.target.id==='modal-detail')closeDetail();});
init();
</script>
<script src="../js/i18n.js"></script>
</body>
</html>
