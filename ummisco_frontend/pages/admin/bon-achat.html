<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bon d-achat UMMISCO Admin</title>
  <link rel="stylesheet" href="../../css/global.css"/>
  <style>
    .ba-section{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:24px;margin-bottom:16px;}
    .ba-title{font-size:14px;font-weight:700;color:#1e293b;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:8px;}
    .ba-title svg{color:#003f87;}
    .ba-rh{display:grid;grid-template-columns:2fr 1.5fr 1.5fr 80px 1.5fr 36px;gap:8px;padding:8px 10px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px 6px 0 0;font-size:11px;font-weight:700;text-transform:uppercase;color:#64748b;}
    .ba-row{display:grid;grid-template-columns:2fr 1.5fr 1.5fr 80px 1.5fr 36px;gap:8px;padding:8px 10px;border:1px solid #e2e8f0;border-top:none;align-items:center;}
    .ba-row input{width:100%;padding:6px 8px;border:1px solid #d1d5db;border-radius:5px;font-size:12px;font-family:inherit;}
    .ba-row input:focus{border-color:#003f87;outline:none;}
    .ba-row input[readonly]{background:#f8fafc;color:#003f87;font-weight:700;}
    .ba-del{width:28px;height:28px;border:none;border-radius:5px;background:#fee2e2;color:#dc2626;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .ba-total{display:flex;justify-content:flex-end;gap:12px;margin-top:10px;padding:10px 12px;background:#eff6ff;border-radius:6px;font-size:14px;font-weight:700;color:#003f87;}
    .sp{width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="ba-section">
  <div class="ba-title"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Informations du demandeur</div>
  <div class="gap-form">
    <div class="grid-2">
      <div class="form-group"><label class="form-label">Nom et prenom(s) du demandeur</label><input class="form-input" id="ba-demandeur" type="text" placeholder="Prenom NOM"/></div>
      <div class="form-group"><label class="form-label">Service / Structure</label><input class="form-input" id="ba-service" type="text" placeholder="Ex: UMMISCO / ESP"/></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label class="form-label">EOTP ou Centre de cout</label><input class="form-input" id="ba-eotp" type="text" placeholder="Ex: PROJ-2025-001"/></div>
      <div class="form-group"><label class="form-label">Date</label><input class="form-input" id="ba-date" type="date"/></div>
    </div>
    <div class="form-group"><label class="form-label">Adresse de livraison</label><input class="form-input" id="ba-adresse" type="text" placeholder="Ex: ESP / UCAD, Dakar"/></div>
  </div>
</div>
<div class="ba-section">
  <div class="ba-title"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>Articles commandes</div>
  <div class="ba-rh"><span>Objet de la commande</span><span>Fournisseur</span><span>Prix unitaire (FCFA)</span><span>Qte</span><span>Prix total (FCFA)</span><span></span></div>
  <div id="ba-lignes"></div>
  <button class="btn btn--ghost btn--sm" style="margin-top:10px" onclick="addLigne()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Ajouter une ligne</button>
  <div class="ba-total"><span>Total general :</span><span id="ba-total">0 FCFA</span></div>
</div>
<div style="display:flex;gap:10px">
  <button class="btn btn--primary" id="ba-btn" onclick="telecharger()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Telecharger Word</button>
  <button class="btn btn--ghost" onclick="resetForm()">Reinitialiser</button>
</div>
<script src="../../js/api.js"></script>
<script src="../../js/admin-layout.js"></script>
<script>
initAdminLayout('bon-achat');
let lignes=[];
function esc(s){return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function fmt(n){return Number(n).toLocaleString('fr-FR');}
function addLigne(){lignes.push({objet:'',fournisseur:'',pu:0,qte:1});renderLignes();}
function removeLigne(i){lignes.splice(i,1);renderLignes();}
function updateLigne(i,f,v){lignes[i][f]=(f==='objet'||f==='fournisseur')?v:(parseFloat(v)||0);renderLignes();}
function renderLignes(){
  const c=document.getElementById('ba-lignes');if(!c)return;
  if(!lignes.length){c.innerHTML='<div style="padding:16px;text-align:center;font-size:13px;color:#94a3b8;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 6px 6px">Aucun article</div>';const t=document.getElementById('ba-total');if(t)t.textContent='0 FCFA';return;}
  c.innerHTML=lignes.map((l,i)=>'<div class="ba-row"><input value="'+esc(l.objet)+'" placeholder="Description" oninput="updateLigne('+i+',\'objet\',this.value)"/><input value="'+esc(l.fournisseur)+'" placeholder="Fournisseur" oninput="updateLigne('+i+',\'fournisseur\',this.value)"/><input type="number" min="0" value="'+(l.pu||0)+'" oninput="updateLigne('+i+',\'pu\',this.value)"/><input type="number" min="1" value="'+(l.qte||1)+'" oninput="updateLigne('+i+',\'qte\',this.value)"/><input type="number" readonly value="'+((l.pu||0)*(l.qte||1))+'"/><button class="ba-del" onclick="removeLigne('+i+')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>').join('');
  const t=document.getElementById('ba-total');if(t)t.textContent=fmt(lignes.reduce((s,l)=>s+(l.pu||0)*(l.qte||1),0))+' FCFA';
}
function getData(){return{demandeur:(document.getElementById('ba-demandeur')||{}).value||'',service:(document.getElementById('ba-service')||{}).value||'',eotp:(document.getElementById('ba-eotp')||{}).value||'',date:(document.getElementById('ba-date')||{}).value||'',adresse:(document.getElementById('ba-adresse')||{}).value||'',lignes};}
async function telecharger(){
  const d=getData();
  if(!d.demandeur){alert('Veuillez renseigner le nom du demandeur.');return;}
  if(!d.lignes.length){alert('Ajoutez au moins un article.');return;}
  const btn=document.getElementById('ba-btn');btn.disabled=true;btn.innerHTML='<div class="sp"></div> Generation...';
  try{await api.download('/documents/bon-achat/docx',{demandeur:d.demandeur,service:d.service,eotp:d.eotp,date:d.date,adresse:d.adresse,lignes:d.lignes.map(l=>({objet:l.objet,fournisseur:l.fournisseur,prix_unitaire:l.pu||0,quantite:l.qte||1}))},'bon-achat.docx');Toast.success('Document telecharge');}
  catch(e){alert('Erreur : '+e.message);}
  finally{btn.disabled=false;btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Telecharger Word';}
}
function resetForm(){['ba-demandeur','ba-eotp','ba-adresse'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});const s=document.getElementById('ba-service');if(s)s.value='UMMISCO ESP/UCAD';const dt=document.getElementById('ba-date');if(dt)dt.value=new Date().toISOString().split('T')[0];lignes=[];renderLignes();}
setTimeout(()=>{const u=Auth.getUser();const dem=document.getElementById('ba-demandeur');if(dem&&u)dem.value=(u.prenom||'')+' '+(u.nom||'');const svc=document.getElementById('ba-service');if(svc)svc.value='UMMISCO ESP/UCAD';const dt=document.getElementById('ba-date');if(dt)dt.value=new Date().toISOString().split('T')[0];addLigne();},50);
</script>
</body>
</html>
