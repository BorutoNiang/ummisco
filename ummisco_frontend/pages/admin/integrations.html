<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Intégrations — UMMISCO Admin</title>
  <link rel="stylesheet" href="../../css/global.css"/>
  <style>
    .int-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
    @media(max-width:1100px){ .int-grid { grid-template-columns:repeat(2,1fr); } }
    @media(max-width:700px) { .int-grid { grid-template-columns:1fr; } }
    .int-card {
      background:var(--c-surface); border:1px solid var(--c-border);
      border-radius:var(--radius-lg); overflow:hidden;
      transition:all var(--transition);
    }
    .int-card.inactive { opacity:.55; }
    .int-card:hover { border-color:var(--c-border2); box-shadow:var(--shadow-md); }
    .int-preview {
      height:160px; background:var(--c-surface2);
      display:flex; align-items:center; justify-content:center;
      position:relative; overflow:hidden; cursor:pointer;
    }
    .int-preview iframe {
      width:300%; height:300%; transform:scale(.333) translateX(-100%) translateY(-100%);
      border:none; pointer-events:none;
    }
    .int-preview-placeholder {
      display:flex; flex-direction:column; align-items:center; gap:8px;
      color:var(--c-text3);
    }
    .int-preview-placeholder .icon { font-size:36px; }
    .int-preview-placeholder span  { font-size:13px; }
    .int-body { padding:18px 20px; }
    .int-title { font-weight:600; font-size:15px; margin-bottom:4px; }
    .int-url   { font-family:var(--font-mono); font-size:11px; color:var(--c-text3); word-break:break-all; margin-bottom:10px; }
    .int-meta  { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
    .int-type  {
      display:inline-block; padding:3px 10px; border-radius:100px;
      font-size:11px; font-weight:500;
      background:rgba(59,130,246,.12); color:var(--c-primary);
    }
    .int-actions { display:flex; gap:6px; }
    .toggle-btn {
      padding:5px 12px; border-radius:var(--radius-sm);
      font-size:12px; font-weight:500; cursor:pointer;
      transition:all var(--transition); border:1px solid var(--c-border2);
    }
    .toggle-btn.on  { background:rgba(6,214,160,.1);  color:var(--c-accent);  border-color:rgba(6,214,160,.2); }
    .toggle-btn.off { background:rgba(239,68,68,.1);   color:var(--c-danger);  border-color:rgba(239,68,68,.2); }
    .iframe-modal-body { height:70vh; }
    .iframe-modal-body iframe { width:100%; height:100%; border:none; border-radius:var(--radius-md); }
  </style>
</head>
<body>

<div class="flex-between mb-lg">
  <div>
    <p class="text-muted" style="font-size:14px;margin-top:4px">
      Outils doctoraux embarqués via iframes — Evelop, prédiction carbone, capteurs arbres.
    </p>
  </div>
  <div id="add-btn-wrap"></div>
</div>

<div class="int-grid" id="int-grid">
  <div class="skeleton" style="height:240px;border-radius:var(--radius-lg)"></div>
  <div class="skeleton" style="height:240px;border-radius:var(--radius-lg)"></div>
  <div class="skeleton" style="height:240px;border-radius:var(--radius-lg)"></div>
</div>

<!-- Modal ajout -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Nouvelle intégration</span>
      <div class="modal-close" onclick="closeModal()">✕</div>
    </div>
    <form id="int-form" class="gap-form">
      <div class="form-group">
        <label class="form-label">Nom *</label>
        <input class="form-input" id="f-nom" required placeholder="Ex: Catalogue Evelop"/>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-input" id="f-desc" rows="2" placeholder="Description de l'outil…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">URL iframe *</label>
        <input class="form-input" id="f-url" type="url" required placeholder="https://outil.ummisco.ucad.sn"/>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Type</label>
          <select class="form-input" id="f-type">
            <option value="simulation">Simulation</option>
            <option value="catalogue">Catalogue</option>
            <option value="capteur">Capteur</option>
            <option value="cartographie">Cartographie</option>
            <option value="autre">Autre</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Axe thématique</label>
          <select class="form-input" id="f-axe"><option value="">— Aucun —</option></select>
        </div>
      </div>
      <div id="form-alert"></div>
      <div class="flex" style="gap:10px;justify-content:flex-end">
        <button type="button" class="btn btn--ghost" onclick="closeModal()">Annuler</button>
        <button type="submit" class="btn btn--accent" id="form-submit">Ajouter</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal aperçu iframe -->
<div class="modal-overlay" id="modal-preview">
  <div class="modal" style="max-width:900px;width:calc(100% - 40px)">
    <div class="modal-header">
      <span class="modal-title" id="preview-title">Aperçu</span>
      <div class="modal-close" onclick="closePreview()">✕</div>
    </div>
    <div class="iframe-modal-body">
      <iframe id="preview-iframe" src="" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    </div>
  </div>
</div>

<script src="../../js/api.js"></script>
<script src="../../js/admin-layout.js"></script>
<script>
initAdminLayout('integrations');
// Chercheur et super_admin ont les mêmes droits sur les intégrations
const canManage = Auth.can('super_admin', 'admin_axe', 'chercheur');

const TYPE_ICONS = { simulation:'🧮', catalogue:'📚', capteur:'📡', cartographie:'🗺', autre:'🔌' };
let integrations=[], axes=[];

async function init(){
  axes = await api.get('/axes/').catch(()=>[]);
  document.getElementById('f-axe').innerHTML += axes.map(a=>`<option value="${a.id}">${a.nom}</option>`).join('');
  // Afficher le bouton d'ajout pour super_admin, admin_axe et chercheur
  if (Auth.can('super_admin', 'admin_axe', 'chercheur')) {
    document.getElementById('add-btn-wrap').innerHTML = '<button class="btn btn--primary" onclick="openModal()">+ Ajouter intégration</button>';
  } else if (Auth.can('doctorant')) {
    document.getElementById('add-btn-wrap').innerHTML = '<button class="btn btn--ghost" onclick="openModal()" title="Votre intégration sera soumise à validation">+ Proposer un outil <span style=\'font-size:11px;color:var(--c-warn)\'>(en attente validation)</span></button>';
  }
  loadData();
}

async function loadData(){
  integrations = await api.get('/integrations/').catch(()=>[]);
  render();
}

function render(){
  const grid=document.getElementById('int-grid');
  if(!integrations.length){
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:64px;color:var(--c-text3)"><div style="font-size:48px;margin-bottom:16px">🔌</div><p>Aucune intégration configurée</p></div>';
    return;
  }
  grid.innerHTML=integrations.map(ie=>`
    <div class="int-card ${ie.actif?'':'inactive'}">
      <div class="int-preview" onclick="openPreview('${ie.url_iframe}','${ie.nom}')">
        <div class="int-preview-placeholder">
          <div class="icon">${TYPE_ICONS[ie.type]||'🔌'}</div>
          <span>Cliquer pour prévisualiser</span>
          <span style="font-size:11px;color:var(--c-text3)">${ie.url_iframe}</span>
        </div>
      </div>
      <div class="int-body">
        <div class="int-title">${ie.nom}</div>
        <div class="int-url">${ie.url_iframe}</div>
        ${ie.description?`<p style="font-size:13px;color:var(--c-text2);margin-bottom:10px">${truncate(ie.description,80)}</p>`:''}
        <div class="int-meta">
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
            <span class="int-type">${ie.type}</span>
            ${ie.axe?`<span style="font-size:11px;color:var(--c-text3)">📌 ${ie.axe.nom}</span>`:''}
          </div>
          <div class="int-actions">
            ${canManage ? `
              <button class="toggle-btn ${ie.actif?'on':'off'}" onclick="toggleInt(${ie.id})">
                ${ie.actif?'Actif':'Inactif'}
              </button>
              <button class="btn btn--sm btn--danger" onclick="deleteInt(${ie.id})">Supprimer</button>
            ` : `<span class="toggle-btn ${ie.actif?'on':'off'}" style="cursor:default;pointer-events:none">${ie.actif?'Actif':'Inactif'}</span>`}
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function openPreview(url, nom){
  document.getElementById('preview-title').textContent = nom;
  document.getElementById('preview-iframe').src = url;
  document.getElementById('modal-preview').classList.add('open');
}
function closePreview(){
  document.getElementById('modal-preview').classList.remove('open');
  document.getElementById('preview-iframe').src='';
}

function openModal(){ document.getElementById('form-alert').innerHTML=''; document.getElementById('int-form').reset(); document.getElementById('modal').classList.add('open'); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

document.getElementById('int-form').addEventListener('submit', async(e)=>{
  e.preventDefault();
  const btn=document.getElementById('form-submit'); btn.disabled=true; btn.textContent='…';
  try{
    await api.post('/integrations/',{
      nom:         document.getElementById('f-nom').value,
      description: document.getElementById('f-desc').value||null,
      url_iframe:  document.getElementById('f-url').value,
      type:        document.getElementById('f-type').value,
      axe_id:      document.getElementById('f-axe').value?+document.getElementById('f-axe').value:null,
    });
    Toast.success('Intégration ajoutée'); closeModal(); loadData();
  }catch(err){ document.getElementById('form-alert').innerHTML=`<div class="alert alert--error">${err.message}</div>`; }
  btn.disabled=false; btn.textContent='Ajouter';
});

async function toggleInt(id){
  try{ await api.patch(`/integrations/${id}/toggle`); loadData(); Toast.info('Statut mis à jour'); }
  catch(e){ Toast.error(e.message); }
}

async function deleteInt(id){
  if(!confirm('Supprimer cette intégration ?')) return;
  try{ await api.delete(`/integrations/${id}`); Toast.success('Supprimée'); loadData(); }
  catch(e){ Toast.error(e.message); }
}

document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
document.getElementById('modal-preview').addEventListener('click',e=>{if(e.target.id==='modal-preview')closePreview();});
init();
</script>
</body>
</html>
