<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Outils &amp; Simulations — UMMISCO</title>
  <link rel="stylesheet" href="../css/global.css"/>
  <style>
    .tool-card { background:#fff;border:1px solid var(--c-border);border-radius:var(--radius-md);overflow:hidden;transition:box-shadow var(--transition),transform var(--transition); }
    .tool-card:hover { box-shadow:var(--shadow-md);transform:translateY(-2px); }
    .tool-card-header { background:linear-gradient(135deg,var(--c-primary),#0055bb);padding:28px;display:flex;align-items:center;justify-content:center;min-height:120px; }
    .tool-card-body { padding:18px; }
    .tool-card-name { font-weight:700;font-size:1rem;color:var(--c-primary);margin-bottom:6px; }
    .tool-card-desc { font-size:13px;color:var(--c-text2);line-height:1.5;margin-bottom:14px; }
    .tool-type { display:inline-block;padding:2px 10px;border-radius:100px;font-size:11px;font-weight:700;background:var(--c-primary-l);color:var(--c-primary);margin-bottom:10px; }
    .modal-preview-body { height:65vh; }
    .modal-preview-body iframe { width:100%;height:100%;border:none;border-radius:var(--radius-sm); }
  </style>
</head>
<body>
<div class="page-header-inst">
  <div class="container">
    <h1>Outils &amp; Simulations</h1>
    <p>Outils doctoraux et simulations développés par les équipes UMMISCO</p>
  </div>
</div>
<div style="padding:48px 0">
  <div class="container">
    <div class="section-title" style="margin-bottom:28px">
      <div class="section-title-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </div>
      <h2>Intégrations disponibles</h2>
      <div class="section-title-bar"></div>
    </div>
    <div class="grid-3" id="tools-grid">
      <div class="skeleton" style="height:200px"></div>
      <div class="skeleton" style="height:200px"></div>
      <div class="skeleton" style="height:200px"></div>
    </div>
  </div>
</div>

<!-- Modal aperçu -->
<div class="modal-overlay" id="modal-preview">
  <div class="modal" style="max-width:900px;width:calc(100% - 40px)">
    <div class="modal-header">
      <span class="modal-title" id="preview-title">Aperçu</span>
      <div class="modal-close" onclick="closePreview()">✕</div>
    </div>
    <div class="modal-preview-body">
      <iframe id="preview-iframe" src="" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/nav.js"></script>
<script>
initNav({ active:'productions', base:'../' }); initFooter({ base:'../' });

const ICONS = {
  simulation: '<path d="M2 16.1A5 5 0 0 1 5.5 8h.5a5 5 0 0 1 4.9-4A6 6 0 0 1 22 8c0 3.3-2.7 6-6 6h-7a5 5 0 0 1-1.9-.9"/><line x1="12" y1="12" x2="12" y2="20"/><polyline points="8 16 12 20 16 16"/>',
  catalogue:  '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>',
  capteur:    '<path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1"/>',
  cartographie:'<polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>',
  autre:      '<rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>',
};

const DEMO = [
  { id:1, nom:'Catalogue Evelop', description:'Catalogue de modèles doctoraux multi-agents. Permet de simuler des phénomènes complexes en épidémiologie et sciences sociales.', url_iframe:'https://evelop.ummisco.ucad.sn', type:'catalogue', actif:true, axe:{nom:'Épidémiologie'} },
  { id:2, nom:'Prédiction carbone (Osman)', description:'Outil de prédiction spatiale de la teneur en carbone organique des sols — cartographie haute résolution.', url_iframe:'https://carbone.ummisco.ucad.sn', type:'cartographie', actif:true, axe:{nom:'Environnement'} },
  { id:3, nom:'Capteurs végétaux', description:'Dashboard de visualisation des données issues des capteurs de sève et santé végétale installés sur le campus.', url_iframe:'https://capteurs.ummisco.ucad.sn', type:'capteur', actif:true, axe:{nom:'IoT & Science citoyenne'} },
];

async function load() {
  let tools = [];
  try { tools = await api.get('/integrations/'); } catch { tools = DEMO; }
  const grid = document.getElementById('tools-grid');
  if (!tools.length) { grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;padding:64px;color:var(--c-text3)">Aucun outil disponible pour le moment.</p>'; return; }
  grid.innerHTML = tools.map(t => `
    <div class="tool-card">
      <div class="tool-card-header">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.4">${ICONS[t.type]||ICONS.autre}</svg>
      </div>
      <div class="tool-card-body">
        <div class="tool-type">${t.type}</div>
        <div class="tool-card-name">${t.nom}</div>
        <div class="tool-card-desc">${truncate(t.description||'',100)}</div>
        ${t.axe?`<div style="font-size:12px;color:var(--c-text3);margin-bottom:12px">Axe : ${t.axe.nom}</div>`:''}
        <button class="btn btn--primary btn--sm" onclick="openPreview('${t.url_iframe}','${t.nom}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          Ouvrir l'outil
        </button>
      </div>
    </div>`).join('');
}

function openPreview(url, nom) {
  document.getElementById('preview-title').textContent = nom;
  document.getElementById('preview-iframe').src = url;
  document.getElementById('modal-preview').classList.add('open');
}
function closePreview() {
  document.getElementById('modal-preview').classList.remove('open');
  document.getElementById('preview-iframe').src = '';
}
document.getElementById('modal-preview').addEventListener('click', e => { if (e.target.id === 'modal-preview') closePreview(); });
load();
</script>
<script src="../js/i18n.js"></script>
</body>
</html>
