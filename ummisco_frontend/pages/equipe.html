<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Équipe — UMMISCO</title>
  <link rel="stylesheet" href="../css/global.css"/>
  <style>
    .filters-bar { display:flex;gap:12px;flex-wrap:wrap;padding:20px 0;border-bottom:1px solid var(--c-border);margin-bottom:28px; }
    .search-box  { flex:1;min-width:220px;background:#fff;border:1px solid var(--c-border);border-radius:var(--radius-sm);padding:9px 14px;font-size:14px;color:var(--c-text); }
    .search-box:focus { border-color:var(--c-primary);outline:none; }
    .filter-pill { padding:6px 14px;border-radius:100px;border:1px solid var(--c-border);font-size:13px;cursor:pointer;transition:all var(--transition);color:var(--c-text2);background:#fff; }
    .filter-pill:hover { border-color:var(--c-primary);color:var(--c-primary); }
    .filter-pill.active { background:var(--c-primary);color:#fff;border-color:var(--c-primary); }
    .member-card { background:#fff;border:1px solid var(--c-border);border-radius:var(--radius-md);padding:22px;text-align:center;transition:box-shadow var(--transition),transform var(--transition);cursor:pointer; }
    .member-card:hover { box-shadow:var(--shadow-md);transform:translateY(-2px); }
    .member-avatar { width:68px;height:68px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff; }
    .member-name { font-weight:700;font-size:.95rem;margin-bottom:3px;color:var(--c-primary); }
    .member-role-tag { display:inline-block;padding:2px 10px;border-radius:100px;font-size:11px;font-weight:700;background:var(--c-primary-l);color:var(--c-primary);margin-bottom:8px; }
    .member-axes  { display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:8px; }
    .member-bio   { font-size:12px;color:var(--c-text2);line-height:1.5; }
  </style>
</head>
<body>
<div class="page-header-inst">
  <div class="container">
    <h1 data-i18n="page.equipe.title">L'équipe</h1>
    <p>Chercheurs permanents, doctorants et membres associés de l'UMMISCO</p>
  </div>
</div>

<div style="padding:40px 0 64px">
  <div class="container">
    <div class="filters-bar">
      <input class="search-box" type="search" id="search" placeholder="Rechercher par nom…" oninput="render()"/>
      <button class="filter-pill active" onclick="setRole('',this)">Tous</button>
      <button class="filter-pill" onclick="setRole('chercheur',this)">Chercheurs</button>
      <button class="filter-pill" onclick="setRole('doctorant',this)">Doctorants</button>
      <button class="filter-pill" onclick="setRole('admin_axe',this)">Responsables d'axe</button>
    </div>
    <div style="font-size:13px;color:var(--c-text3);margin-bottom:18px" id="count-label"></div>
    <div class="grid-4" id="members-grid">
      <div class="skeleton" style="height:220px"></div>
      <div class="skeleton" style="height:220px"></div>
      <div class="skeleton" style="height:220px"></div>
      <div class="skeleton" style="height:220px"></div>
    </div>
  </div>
</div>

<!-- Modal profil -->
<div class="modal-overlay" id="modal-profile">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <span class="modal-title" id="profile-name"></span>
      <div class="modal-close" onclick="closeProfile()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
    </div>
    <div id="profile-body"></div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/nav.js"></script>
<script>
initNav({ active:'unite', base:'../' }); initFooter({ base:'../' });

const ROLE_COLORS = { super_admin:'#dc2626', admin_axe:'#d97706', chercheur:'#003f87', doctorant:'#059669', partenaire:'#7c3aed', etudiant:'#6b7280' };
const DEMO = [
  { id:1, prenom:'Oumar',    nom:'Diallo',  role:{libelle:'chercheur'},  bio:'Spécialiste en modélisation épidémiologique et simulation multi-agents.', axes:[{nom:'Épidémiologie'}] },
  { id:2, prenom:'Fatou',    nom:'Ndiaye',  role:{libelle:'chercheur'},  bio:'Experte IoT et sciences citoyennes, réseaux de capteurs connectés.', axes:[{nom:'IoT & Science citoyenne'}] },
  { id:3, prenom:'Moussa',   nom:'Sow',     role:{libelle:'admin_axe'},  bio:'Responsable de l\'axe environnement, modélisation des sols.', axes:[{nom:'Environnement'}] },
  { id:4, prenom:'Aïda',     nom:'Baldé',   role:{libelle:'doctorant'},  bio:'Doctorat sur la prédiction spatiale du carbone dans les sols.', axes:[{nom:'Environnement'}] },
  { id:5, prenom:'Ibra',     nom:'Fall',    role:{libelle:'chercheur'},  bio:'Modélisation des systèmes cardiaques végétaux.', axes:[{nom:'Cardiologie'}] },
  { id:6, prenom:'Seynabou', nom:'Dieye',   role:{libelle:'doctorant'},  bio:'Capteurs végétaux et santé des arbres tropicaux.', axes:[{nom:'IoT & Science citoyenne'}] },
  { id:7, prenom:'Lamine',   nom:'Guèye',   role:{libelle:'chercheur'},  bio:'Cartographie géologique et prédiction spatiale des sols.', axes:[{nom:'Géologie'}] },
  { id:8, prenom:'Mariama',  nom:'Thiam',   role:{libelle:'doctorant'},  bio:'Intelligence artificielle pour la prédiction spatiale.', axes:[{nom:'Géologie'}] },
];

let members = [], activeRole = '';

function setRole(r, btn) {
  activeRole = r;
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = members.filter(m =>
    (!activeRole || m.role?.libelle === activeRole) &&
    (!q || `${m.nom} ${m.prenom}`.toLowerCase().includes(q))
  );
  document.getElementById('count-label').textContent = `${filtered.length} membre${filtered.length !== 1 ? 's' : ''} trouvé${filtered.length !== 1 ? 's' : ''}`;
  const grid = document.getElementById('members-grid');
  if (!filtered.length) { grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;padding:48px;color:var(--c-text3)">Aucun membre trouvé.</p>'; return; }
  grid.innerHTML = filtered.map(m => {
    const bg = ROLE_COLORS[m.role?.libelle] || 'var(--c-primary)';
    return `<div class="member-card" onclick="openProfile(${m.id})">
      <div class="member-avatar" style="background:${bg}">${avatarInitials(m.nom, m.prenom)}</div>
      <div class="member-name">${m.prenom} ${m.nom}</div>
      <div class="member-role-tag">${m.role?.libelle || 'membre'}</div>
      <div class="member-axes">${(m.axes||[]).map(a => `<span class="badge badge--protege" style="font-size:10px">${a.nom}</span>`).join('')}</div>
      <div class="member-bio">${truncate(m.bio||'', 90)}</div>
    </div>`;
  }).join('');
}

function openProfile(id) {
  const m = members.find(x => x.id === id); if (!m) return;
  const bg = ROLE_COLORS[m.role?.libelle] || 'var(--c-primary)';
  document.getElementById('profile-name').textContent = `${m.prenom} ${m.nom}`;
  document.getElementById('profile-body').innerHTML = `
    <div style="display:flex;gap:18px;align-items:flex-start;margin-bottom:18px">
      <div style="width:64px;height:64px;border-radius:50%;background:${bg};display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0">${avatarInitials(m.nom,m.prenom)}</div>
      <div>
        <div style="font-size:.95rem;font-weight:700;color:var(--c-primary);margin-bottom:2px">${m.prenom} ${m.nom}</div>
        <div class="badge badge--protege" style="font-size:11px">${m.role?.libelle||'—'}</div>
        ${m.email ? `<div style="font-size:13px;color:var(--c-text2);margin-top:6px;display:flex;align-items:center;gap:6px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>${m.email}</div>` : ''}
      </div>
    </div>
    ${m.bio ? `<p style="font-size:14px;color:var(--c-text2);line-height:1.7;margin-bottom:14px">${m.bio}</p>` : ''}
    ${(m.axes||[]).length ? `<div><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--c-text3);margin-bottom:8px">Axes de recherche</div><div style="display:flex;gap:6px;flex-wrap:wrap">${(m.axes||[]).map(a=>`<span class="badge badge--protege">${a.nom}</span>`).join('')}</div></div>` : ''}
    <div style="margin-top:18px"><a href="publications.html" class="btn btn--ghost btn--sm">Voir ses publications</a></div>`;
  document.getElementById('modal-profile').classList.add('open');
}
function closeProfile() { document.getElementById('modal-profile').classList.remove('open'); }
document.getElementById('modal-profile').addEventListener('click', e => { if (e.target.id === 'modal-profile') closeProfile(); });

async function load() {
  try { members = await api.get('/utilisateurs/?limit=200'); } catch { members = DEMO; }
  render();
}
load();
</script>
<script src="../js/i18n.js"></script>
</body>
</html>
