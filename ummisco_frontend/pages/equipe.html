<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Équipe — UMMISCO</title>
  <link rel="stylesheet" href="../css/global.css"/>
  <style>
    /* ── Filters ── */
    .filters-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
      padding: 20px 0;
      border-bottom: 1px solid var(--c-border);
      margin-bottom: 28px;
    }
    .search-box {
      flex: 1;
      min-width: 220px;
      background: #fff;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      padding: 9px 14px;
      font-size: 14px;
      color: var(--c-text);
    }
    .search-box:focus { border-color: var(--c-primary); outline: none; }

    /* ── Horizontal member card ── */
    .member-card-h {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #fff;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      padding: 16px;
      cursor: pointer;
      transition: box-shadow var(--transition);
    }
    .member-card-h:hover { box-shadow: var(--shadow-md); }
    .member-photo {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: #f1f5f9;
    }
    .member-name  { font-weight: 700; font-size: 14px; color: var(--c-text); margin-bottom: 3px; }
    .member-role-text   { font-size: 12px; color: var(--c-text3); font-style: italic; margin-bottom: 3px; }
    .member-centre-text { font-size: 12px; color: #16a34a; font-weight: 600; }
    .member-univ-text   { font-size: 11px; color: var(--c-text3); margin-top: 2px; }

    /* ── 3-col grid ── */
    .members-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 1024px) { .members-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px)  { .members-grid { grid-template-columns: 1fr; } }

    /* ── Modal ── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:500; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:#fff; border-radius:var(--radius-md); max-width:540px; width:90%; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow-lg); }
    .modal-header { display:flex; align-items:center; justify-content:space-between; padding:20px 24px 16px; border-bottom:1px solid var(--c-border); }
    .modal-title  { font-weight:700; font-size:16px; color:var(--c-text); }
    .modal-close  { cursor:pointer; color:var(--c-text3); padding:4px; border-radius:4px; }
    .modal-close:hover { background:var(--c-surface2); }
    .modal-body   { padding:24px; }
  </style>
</head>
<body>
<div class="page-header-inst">
  <div class="container">
    <h1>L'équipe</h1>
    <p>Chercheurs, directeurs de centre et membres associés de l'UMMISCO</p>
  </div>
</div>

<div style="padding:40px 0 64px">
  <div class="container">

    <!-- Filters -->
    <div class="filters-bar">
      <input class="search-box" type="search" id="search" placeholder="Nom, université…" oninput="render()"/>
      <div>
        <label style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--c-text3);display:block;margin-bottom:4px">Centre</label>
        <select id="f-centre" class="form-input" onchange="render()" style="min-width:180px">
          <option value="">Tous les centres</option>
        </select>
      </div>
      <div>
        <label style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--c-text3);display:block;margin-bottom:4px">Rôle</label>
        <select id="f-role" class="form-input" onchange="render()" style="min-width:160px">
          <option value="">Tous les rôles</option>
        </select>
      </div>
      <button class="btn btn--ghost btn--sm" onclick="resetFilters()" style="align-self:flex-end">Réinitialiser</button>
    </div>

    <!-- Count -->
    <div id="count-label" style="font-size:13px;color:var(--c-text3);margin-bottom:18px"></div>

    <!-- Grid -->
    <div class="members-grid" id="members-grid">
      <div class="skeleton" style="height:112px"></div>
      <div class="skeleton" style="height:112px"></div>
      <div class="skeleton" style="height:112px"></div>
      <div class="skeleton" style="height:112px"></div>
      <div class="skeleton" style="height:112px"></div>
      <div class="skeleton" style="height:112px"></div>
    </div>
  </div>
</div>

<!-- Member profile modal -->
<div class="modal-overlay" id="modal-profile">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="profile-name"></span>
      <div class="modal-close" onclick="closeProfile()" aria-label="Fermer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </div>
    </div>
    <div class="modal-body" id="profile-body"></div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/nav.js"></script>
<script>
initNav({ active: 'membres', base: '../' });
initFooter({ base: '../' });

const API_URL = 'https://ummisco.fr/fr/wp-json/eventin-carte/v1/centres';

// All deduplicated members, each augmented with `centre` name
let allMembers = [];
// Quick lookup by post_id
let memberMap  = {};

// ── Data loading ──────────────────────────────────────────────

async function load() {
  try {
    const res  = await fetch(API_URL);
    const json = await res.json();
    const centres = Array.isArray(json) ? json : (json.data || []);

    const seen = new Set();

    centres.forEach(centre => {
      (centre.membres || []).forEach(m => {
        if (!seen.has(m.post_id)) {
          seen.add(m.post_id);
          const member = {
            ...m,
            centre: centre.nom || centre.title || centre.post_title || ''
          };
          allMembers.push(member);
          memberMap[m.post_id] = member;
        }
      });
    });

    // Sort alphabetically by last name (last word of post_title)
    allMembers.sort((a, b) => {
      const la = (a.post_title || '').split(' ').pop();
      const lb = (b.post_title || '').split(' ').pop();
      return la.localeCompare(lb, 'fr');
    });

    populateFilters(centres);
    render();
  } catch (err) {
    console.error('Erreur chargement équipe:', err);
    document.getElementById('members-grid').innerHTML =
      '<p style="grid-column:1/-1;text-align:center;padding:48px;color:var(--c-text3)">Impossible de charger les membres.</p>';
  }
}

function populateFilters(centres) {
  // Centres dropdown
  const selCentre = document.getElementById('f-centre');
  centres.forEach(c => {
    const name = c.nom || c.title || c.post_title || '';
    if (!name) return;
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    selCentre.appendChild(opt);
  });

  // Roles dropdown — collect unique roles from members
  const roles = [...new Set(allMembers.map(m => m.role).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'fr'));
  const selRole = document.getElementById('f-role');
  roles.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r;
    opt.textContent = r;
    selRole.appendChild(opt);
  });
}

// ── Rendering ─────────────────────────────────────────────────

function render() {
  const q       = document.getElementById('search').value.toLowerCase().trim();
  const fCentre = document.getElementById('f-centre').value;
  const fRole   = document.getElementById('f-role').value;

  const filtered = allMembers.filter(m => {
    const name = (m.post_title || '').toLowerCase();
    const univ = (m.universite || '').toLowerCase();
    const matchQ      = !q      || name.includes(q) || univ.includes(q);
    const matchCentre = !fCentre || m.centre === fCentre;
    const matchRole   = !fRole   || m.role   === fRole;
    return matchQ && matchCentre && matchRole;
  });

  const label = document.getElementById('count-label');
  label.textContent = `${filtered.length} membre${filtered.length !== 1 ? 's' : ''} trouvé${filtered.length !== 1 ? 's' : ''}`;

  const grid = document.getElementById('members-grid');
  if (!filtered.length) {
    grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;padding:48px;color:var(--c-text3)">Aucun membre trouvé.</p>';
    return;
  }

  grid.innerHTML = filtered.map(m => {
    const photo = m.photo || '';
    const name  = m.post_title || '—';
    const role  = m.role || '';
    const univ  = m.universite || '';
    return `
      <div class="member-card-h" onclick="openProfile(${m.post_id})" tabindex="0"
           onkeydown="if(event.key==='Enter')openProfile(${m.post_id})" role="button" aria-label="Voir le profil de ${name}">
        <img src="${photo}" alt="${name}" class="member-photo"
             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2280%22 height=%2280%22 viewBox=%220 0 80 80%22%3E%3Crect width=%2280%22 height=%2280%22 fill=%22%23e2e8f0%22 rx=%228%22/%3E%3Ctext x=%2240%22 y=%2248%22 text-anchor=%22middle%22 font-size=%2226%22 font-family=%22sans-serif%22 fill=%22%2394a3b8%22%3E${name.split(' ').map(w => w[0]||'').join('').slice(0,2).toUpperCase()}%3C/text%3E%3C/svg%3E'"/>
        <div style="min-width:0">
          <div class="member-name">${name}</div>
          <div class="member-role-text">${role}</div>
          <div class="member-centre-text">${m.centre}</div>
          ${univ ? `<div class="member-univ-text">${univ}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('f-centre').value = '';
  document.getElementById('f-role').value = '';
  render();
}

// ── Modal ─────────────────────────────────────────────────────

function openProfile(postId) {
  const m = memberMap[postId];
  if (!m) return;

  document.getElementById('profile-name').textContent = m.post_title || '';

  const photo = m.photo || '';
  const nameInitials = (m.post_title || '').split(' ').map(w => w[0] || '').join('').slice(0, 2).toUpperCase();

  document.getElementById('profile-body').innerHTML = `
    <div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:20px">
      <img src="${photo}" alt="${m.post_title}"
           style="width:100px;height:100px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#f1f5f9"
           onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23e2e8f0%22 rx=%2210%22/%3E%3Ctext x=%2250%22 y=%2262%22 text-anchor=%22middle%22 font-size=%2232%22 font-family=%22sans-serif%22 fill=%22%2394a3b8%22%3E${nameInitials}%3C/text%3E%3C/svg%3E'"/>
      <div>
        <div style="font-size:18px;font-weight:700;color:var(--c-text);margin-bottom:6px">${m.post_title || '—'}</div>
        ${m.role ? `<div style="font-size:13px;color:var(--c-text3);font-style:italic;margin-bottom:6px">${m.role}</div>` : ''}
        ${m.centre ? `<div style="font-size:13px;color:#16a34a;font-weight:600;margin-bottom:6px">${m.centre}</div>` : ''}
        ${m.universite ? `
          <div style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--c-text2)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
            </svg>
            ${m.universite}
          </div>` : ''}
      </div>
    </div>`;

  document.getElementById('modal-profile').classList.add('open');
  document.getElementById('modal-profile').focus();
}

function closeProfile() {
  document.getElementById('modal-profile').classList.remove('open');
}

document.getElementById('modal-profile').addEventListener('click', e => {
  if (e.target.id === 'modal-profile') closeProfile();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeProfile();
});

// ── Start ─────────────────────────────────────────────────────
load();
</script>
<script src="../js/i18n.js"></script>
</body>
</html>
