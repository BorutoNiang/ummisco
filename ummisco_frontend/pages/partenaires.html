<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Partenaires — UMMISCO</title>
  <link rel="stylesheet" href="../css/global.css"/>
  <style>
    /* ── Section header ── */
    .section-centre {
      margin-bottom: 40px;
    }
    .section-centre-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--c-primary);
      margin-bottom: 6px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--c-primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .centre-badge {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 3px 10px;
      border-radius: 100px;
      background: var(--c-primary-l);
      color: var(--c-primary);
    }

    /* ── Logo grids ── */
    .logo-group-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--c-text3);
      margin: 16px 0 10px;
    }
    .logos-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }
    .logo-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      padding: 20px 18px;
      width: 160px;
      text-align: center;
      transition: box-shadow var(--transition), transform var(--transition), border-color var(--transition);
    }
    .logo-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-color: var(--c-primary);
    }
    .logo-card img {
      width: 120px;
      height: 64px;
      object-fit: contain;
      display: block;
    }
    .logo-card-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--c-text2);
      line-height: 1.4;
    }
    .logo-placeholder {
      width: 120px;
      height: 64px;
      background: #f1f5f9;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--c-text3);
    }

    /* ── Stats bar ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }
    @media (max-width: 640px) { .stats-row { grid-template-columns: 1fr 1fr; } }
    .stat-box {
      background: #fff;
      border: 1px solid var(--c-border);
      border-top: 3px solid var(--c-primary);
      border-radius: var(--radius-sm);
      padding: 16px;
      text-align: center;
    }
    .stat-box-num { font-size: 1.8rem; font-weight: 700; color: var(--c-primary); }
    .stat-box-lbl { font-size: 12px; color: var(--c-text3); }

    /* ── Filters ── */
    .filters-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
      padding: 20px 0;
      border-bottom: 1px solid var(--c-border);
      margin-bottom: 36px;
    }
  </style>
</head>
<body>

<div class="page-header-inst">
  <div class="container">
    <h1>Partenaires</h1>
    <p>Tutelles et partenaires des centres UMMISCO dans le monde</p>
  </div>
</div>

<div style="padding:48px 0 64px">
  <div class="container">

    <!-- Stats -->
    <div class="stats-row" id="stats-row">
      <div class="stat-box">
        <div class="stat-box-num" id="st-centres">—</div>
        <div class="stat-box-lbl">Centres</div>
      </div>
      <div class="stat-box" style="border-top-color:#2563eb">
        <div class="stat-box-num" style="color:#2563eb" id="st-tutelles">—</div>
        <div class="stat-box-lbl">Tutelles</div>
      </div>
      <div class="stat-box" style="border-top-color:#059669">
        <div class="stat-box-num" style="color:#059669" id="st-partners">—</div>
        <div class="stat-box-lbl">Partenaires</div>
      </div>
    </div>

    <!-- Filter by centre -->
    <div class="filters-bar">
      <div>
        <label style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--c-text3);display:block;margin-bottom:4px">Filtrer par centre</label>
        <select id="f-centre" class="form-input" onchange="render()" style="min-width:220px">
          <option value="">Tous les centres</option>
        </select>
      </div>
      <button class="btn btn--ghost btn--sm" onclick="resetFilters()" style="align-self:flex-end">Réinitialiser</button>
    </div>

    <!-- Per-centre partner groups -->
    <div id="partners-root">
      <div class="skeleton" style="height:180px;margin-bottom:24px"></div>
      <div class="skeleton" style="height:180px;margin-bottom:24px"></div>
    </div>

  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/nav.js"></script>
<script>
initNav({ active: 'centres', base: '../' });
initFooter({ base: '../' });

const API_URL = 'https://ummisco.fr/fr/wp-json/eventin-carte/v1/centres';

let centresData = [];

// ── Load ──────────────────────────────────────────────────────

async function load() {
  try {
    const res  = await fetch(API_URL);
    const json = await res.json();
    centresData = Array.isArray(json) ? json : (json.data || []);

    // Count unique tutelles and partenaires
    const seenTutelles  = new Set();
    const seenPartners  = new Set();
    centresData.forEach(c => {
      (c.tutelles    || []).forEach(t => t.logo && seenTutelles.add(t.logo));
      (c.partenaires || []).forEach(p => p.logo && seenPartners.add(p.logo));
    });

    document.getElementById('st-centres').textContent  = centresData.length;
    document.getElementById('st-tutelles').textContent  = seenTutelles.size;
    document.getElementById('st-partners').textContent  = seenPartners.size;

    // Populate centre dropdown
    const sel = document.getElementById('f-centre');
    centresData.forEach(c => {
      const name = c.nom || c.title || c.post_title || '';
      if (!name) return;
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      sel.appendChild(opt);
    });

    render();
  } catch (err) {
    console.error('Erreur chargement partenaires:', err);
    document.getElementById('partners-root').innerHTML =
      '<p style="text-align:center;padding:48px;color:var(--c-text3)">Impossible de charger les partenaires.</p>';
  }
}

// ── Render ────────────────────────────────────────────────────

function render() {
  const fCentre = document.getElementById('f-centre').value;
  const filtered = fCentre
    ? centresData.filter(c => (c.nom || c.title || c.post_title) === fCentre)
    : centresData;

  const root = document.getElementById('partners-root');

  if (!filtered.length) {
    root.innerHTML = '<p style="text-align:center;padding:48px;color:var(--c-text3)">Aucun centre trouvé.</p>';
    return;
  }

  root.innerHTML = filtered.map(centre => {
    const centreName = centre.nom || centre.title || centre.post_title || 'Centre';
    const tutelles   = centre.tutelles   || [];
    const partners   = centre.partenaires || [];

    const hasTutelles = tutelles.length > 0;
    const hasPartners = partners.length > 0;

    if (!hasTutelles && !hasPartners) return '';

    const tutellesHtml = hasTutelles ? `
      <div class="logo-group-title">Tutelles</div>
      <div class="logos-grid">
        ${tutelles.map(t => logoCard(t, '#1e40af', '#dbeafe')).join('')}
      </div>` : '';

    const partnersHtml = hasPartners ? `
      <div class="logo-group-title" style="margin-top:${hasTutelles ? '20px' : '0'}">Partenaires</div>
      <div class="logos-grid">
        ${partners.map(p => logoCard(p, '#065f46', '#d1fae5')).join('')}
      </div>` : '';

    return `
      <div class="section-centre">
        <div class="section-centre-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          ${centreName}
          <span class="centre-badge">${tutelles.length + partners.length} logos</span>
        </div>
        ${tutellesHtml}
        ${partnersHtml}
      </div>`;
  }).join('');
}

function logoCard(item, badgeColor, badgeBg) {
  const name = item.name || '';
  const logo = item.logo || '';
  const imgHtml = logo
    ? `<img src="${logo}" alt="${name}" loading="lazy"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
       <div class="logo-placeholder" style="display:none">
         <span>${name.slice(0, 2).toUpperCase() || '?'}</span>
       </div>`
    : `<div class="logo-placeholder"><span>${name.slice(0, 2).toUpperCase() || '?'}</span></div>`;

  return `
    <div class="logo-card">
      ${imgHtml}
      ${name ? `<div class="logo-card-name">${name}</div>` : ''}
    </div>`;
}

function resetFilters() {
  document.getElementById('f-centre').value = '';
  render();
}

// ── Start ─────────────────────────────────────────────────────
load();
</script>
<script src="../js/i18n.js"></script>
</body>
</html>
