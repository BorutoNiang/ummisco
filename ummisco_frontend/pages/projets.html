<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projets — UMMISCO</title>
  <link rel="stylesheet" href="../css/global.css"/>
  <style>
    /* ── Filters ── */
    .filters-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
      padding: 20px 0;
      border-bottom: 1px solid var(--c-border);
      margin-bottom: 28px;
    }
    .search-box {
      flex: 1;
      min-width: 220px;
      background: #fff;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      padding: 9px 14px;
      font-size: 14px;
      color: var(--c-text);
    }
    .search-box:focus { border-color: var(--c-primary); outline: none; }

    /* ── Stats ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    @media (max-width: 640px) { .stats-row { grid-template-columns: 1fr 1fr; } }
    .stat-box {
      background: #fff;
      border: 1px solid var(--c-border);
      border-top: 3px solid var(--c-primary);
      border-radius: var(--radius-sm);
      padding: 16px;
      text-align: center;
    }
    .stat-box-num { font-size: 1.8rem; font-weight: 700; color: var(--c-primary); }
    .stat-box-lbl { font-size: 12px; color: var(--c-text3); }

    /* ── Project card ── */
    .project-card {
      background: #fff;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow var(--transition), transform var(--transition);
      cursor: default;
    }
    .project-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .project-card-img {
      width: 100%;
      height: 100px;
      object-fit: contain;
      background: #f8fafc;
      padding: 12px 16px;
      border-bottom: 1px solid var(--c-border);
      display: block;
    }
    .project-card-img-placeholder {
      width: 100%;
      height: 100px;
      background: linear-gradient(135deg, #f0f6ff, #e0eeff);
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--c-border);
    }
    .project-card-body {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .project-card-title {
      font-weight: 700;
      font-size: 15px;
      color: var(--c-primary);
    }
    .project-card-centres {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .centre-pill {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 100px;
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }

    /* ── Grid ── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    @media (max-width: 1024px) { .projects-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px)  { .projects-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="page-header-inst">
  <div class="container">
    <h1 data-i18n="page.projets.title">Projets de recherche</h1>
    <p>Projets des centres UMMISCO à travers le monde</p>
  </div>
</div>

<div style="padding:40px 0 64px">
  <div class="container">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-box-num" id="st-total">—</div>
        <div class="stat-box-lbl">Projets uniques</div>
      </div>
      <div class="stat-box" style="border-top-color:#2563eb">
        <div class="stat-box-num" style="color:#2563eb" id="st-centres">—</div>
        <div class="stat-box-lbl">Centres actifs</div>
      </div>
      <div class="stat-box" style="border-top-color:#059669">
        <div class="stat-box-num" style="color:#059669" id="st-with-logo">—</div>
        <div class="stat-box-lbl">Avec logo</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <input class="search-box" type="search" id="search" placeholder="Rechercher un projet…" oninput="render()"/>
      <div>
        <label style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--c-text3);display:block;margin-bottom:4px">Centre</label>
        <select id="f-centre" class="form-input" onchange="render()" style="min-width:200px">
          <option value="">Tous les centres</option>
        </select>
      </div>
      <button class="btn btn--ghost btn--sm" onclick="resetFilters()" style="align-self:flex-end">Réinitialiser</button>
    </div>

    <!-- Count -->
    <div id="count-label" style="font-size:13px;color:var(--c-text3);margin-bottom:18px"></div>

    <!-- Grid -->
    <div class="projects-grid" id="projects-grid">
      <div class="skeleton" style="height:180px"></div>
      <div class="skeleton" style="height:180px"></div>
      <div class="skeleton" style="height:180px"></div>
      <div class="skeleton" style="height:180px"></div>
      <div class="skeleton" style="height:180px"></div>
      <div class="skeleton" style="height:180px"></div>
    </div>

  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/nav.js"></script>
<script>
initNav({ active: 'projets', base: '../' });
initFooter({ base: '../' });

const API_URL = 'https://ummisco.fr/fr/wp-json/eventin-carte/v1/centres';

// allProjects: array of { id, name, image, centres: [centreName, ...] }
let allProjects = [];

// ── Load ──────────────────────────────────────────────────────

async function load() {
  try {
    const res  = await fetch(API_URL);
    const json = await res.json();
    const centres = Array.isArray(json) ? json : (json.data || []);

    // Build project map: id → { id, name, image, centres: [] }
    const projectMap = new Map();

    centres.forEach(centre => {
      const centreName = centre.nom || centre.title || centre.post_title || '';
      (centre.projets || []).forEach(p => {
        if (projectMap.has(p.id)) {
          // Add this centre to the existing project
          const existing = projectMap.get(p.id);
          if (!existing.centres.includes(centreName)) {
            existing.centres.push(centreName);
          }
          // Update image if missing
          if (!existing.image && p.image) existing.image = p.image;
        } else {
          projectMap.set(p.id, {
            id: p.id,
            name: p.name || '',
            image: p.image || null,
            centres: centreName ? [centreName] : []
          });
        }
      });
    });

    allProjects = [...projectMap.values()].sort((a, b) =>
      (a.name || '').localeCompare(b.name || '', 'fr')
    );

    // Stats
    const withLogo = allProjects.filter(p => p.image).length;
    const activeCentres = centres.filter(c => (c.projets || []).length > 0).length;
    document.getElementById('st-total').textContent    = allProjects.length;
    document.getElementById('st-centres').textContent  = activeCentres;
    document.getElementById('st-with-logo').textContent = withLogo;

    // Populate centre dropdown
    const sel = document.getElementById('f-centre');
    centres.forEach(c => {
      const name = c.nom || c.title || c.post_title || '';
      if (!name || !(c.projets || []).length) return;
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      sel.appendChild(opt);
    });

    render();
  } catch (err) {
    console.error('Erreur chargement projets:', err);
    document.getElementById('projects-grid').innerHTML =
      '<p style="grid-column:1/-1;text-align:center;padding:48px;color:var(--c-text3)">Impossible de charger les projets.</p>';
  }
}

// ── Render ────────────────────────────────────────────────────

function render() {
  const q       = document.getElementById('search').value.toLowerCase().trim();
  const fCentre = document.getElementById('f-centre').value;

  const filtered = allProjects.filter(p => {
    const matchQ      = !q      || (p.name || '').toLowerCase().includes(q);
    const matchCentre = !fCentre || p.centres.includes(fCentre);
    return matchQ && matchCentre;
  });

  const label = document.getElementById('count-label');
  label.textContent = `${filtered.length} projet${filtered.length !== 1 ? 's' : ''} trouvé${filtered.length !== 1 ? 's' : ''}`;

  const grid = document.getElementById('projects-grid');

  if (!filtered.length) {
    grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;padding:48px;color:var(--c-text3)">Aucun projet trouvé.</p>';
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const centresPills = p.centres.map(c =>
      `<span class="centre-pill">${c}</span>`
    ).join('');

    const imageSection = p.image
      ? `<img src="${p.image}" alt="${p.name}" class="project-card-img" loading="lazy"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
         <div class="project-card-img-placeholder" style="display:none">
           <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5">
             <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
             <polyline points="22 4 12 14.01 9 11.01"/>
           </svg>
         </div>`
      : `<div class="project-card-img-placeholder">
           <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5">
             <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
             <polyline points="14 2 14 8 20 8"/>
             <line x1="16" y1="13" x2="8" y2="13"/>
             <line x1="16" y1="17" x2="8" y2="17"/>
             <polyline points="10 9 9 9 8 9"/>
           </svg>
         </div>`;

    return `
      <div class="project-card">
        ${imageSection}
        <div class="project-card-body">
          <div class="project-card-title">${p.name || 'Projet sans titre'}</div>
          ${centresPills ? `<div class="project-card-centres">${centresPills}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('f-centre').value = '';
  render();
}

// ── Start ─────────────────────────────────────────────────────
load();
</script>
<script src="../js/i18n.js"></script>
</body>
</html>
