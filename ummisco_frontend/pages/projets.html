<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projets — UMMISCO</title>
  <link rel="stylesheet" href="../css/global.css"/>
  <style>
    .filters-bar { display:flex;gap:12px;flex-wrap:wrap;padding:20px 0;border-bottom:1px solid var(--c-border);margin-bottom:28px; }
    .search-box  { flex:1;min-width:220px;background:#fff;border:1px solid var(--c-border);border-radius:var(--radius-sm);padding:9px 14px;font-size:14px;color:var(--c-text); }
    .search-box:focus { border-color:var(--c-primary);outline:none; }
    .filter-pill { padding:6px 14px;border-radius:100px;border:1px solid var(--c-border);font-size:13px;cursor:pointer;transition:all var(--transition);color:var(--c-text2);background:#fff; }
    .filter-pill:hover  { border-color:var(--c-primary);color:var(--c-primary); }
    .filter-pill.active { background:var(--c-primary);color:#fff;border-color:var(--c-primary); }
    .projet-card { background:#fff;border:1px solid var(--c-border);border-radius:var(--radius-md);padding:22px;border-left:4px solid var(--c-primary);transition:box-shadow var(--transition),transform var(--transition); }
    .projet-card:hover { box-shadow:var(--shadow-md);transform:translateY(-2px); }
    .statut-badge { display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600; }
    .s-en_cours { background:#d1fae5;color:#065f46; }
    .s-planifie  { background:#dbeafe;color:#1e40af; }
    .s-termine   { background:#f1f5f9;color:#475569; }
    .s-suspendu  { background:#fef3c7;color:#92400e; }
    .prog-bar-bg  { height:5px;background:var(--c-surface2);border-radius:3px;overflow:hidden;margin-top:12px; }
    .prog-bar-fill{ height:100%;background:var(--c-primary);border-radius:3px;transition:width .8s ease; }
    .stats-row { display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px; }
    @media(max-width:768px){ .stats-row { grid-template-columns:repeat(2,1fr); } }
    .stat-box { background:#fff;border:1px solid var(--c-border);border-top:3px solid var(--c-primary);border-radius:var(--radius-sm);padding:16px;text-align:center; }
    .stat-box-num { font-size:1.8rem;font-weight:700;color:var(--c-primary); }
    .stat-box-lbl { font-size:12px;color:var(--c-text3); }
  </style>
</head>
<body>
<div class="page-header-inst">
  <div class="container">
    <h1 data-i18n="page.projets.title">Projets de recherche</h1>
    <p>Projets en cours, planifiés et terminés par les équipes UMMISCO</p>
  </div>
</div>

<div style="padding:40px 0">
  <div class="container">
    <!-- Stats -->
    <div class="stats-row" id="stats-row">
      <div class="stat-box"><div class="stat-box-num" id="st-total">—</div><div class="stat-box-lbl">Total</div></div>
      <div class="stat-box" style="border-top-color:#059669"><div class="stat-box-num" style="color:#059669" id="st-cours">—</div><div class="stat-box-lbl">En cours</div></div>
      <div class="stat-box" style="border-top-color:#2563eb"><div class="stat-box-num" style="color:#2563eb" id="st-plan">—</div><div class="stat-box-lbl">Planifiés</div></div>
      <div class="stat-box" style="border-top-color:#6b7280"><div class="stat-box-num" style="color:#6b7280" id="st-fin">—</div><div class="stat-box-lbl">Terminés</div></div>
    </div>

    <div class="filters-bar">
      <input class="search-box" type="search" id="search" placeholder="Rechercher un projet…" oninput="render()"/>
      <button class="filter-pill active" onclick="setStatut('',this)">Tous</button>
      <button class="filter-pill" onclick="setStatut('en_cours',this)">En cours</button>
      <button class="filter-pill" onclick="setStatut('planifie',this)">Planifiés</button>
      <button class="filter-pill" onclick="setStatut('termine',this)">Terminés</button>
    </div>

    <div class="grid-2" id="projets-grid">
      <div class="skeleton" style="height:150px"></div>
      <div class="skeleton" style="height:150px"></div>
      <div class="skeleton" style="height:150px"></div>
      <div class="skeleton" style="height:150px"></div>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/nav.js"></script>
<script>
initNav({ active:'recherches', base:'../' }); initFooter({ base:'../' });

const DEMO = [
  { id:1, titre:'Modélisation épidémique COVID-19 au Sénégal', description:'Développement de modèles SEIR adaptés au contexte africain pour la prédiction des vagues épidémiques.', statut:'termine', axe:{nom:'Épidémiologie'}, responsable:{nom:'Diallo',prenom:'Oumar'}, date_debut:'2020-03-01', date_fin:'2022-12-31', budget:45000 },
  { id:2, titre:'Réseau de capteurs IoT pour la surveillance végétale', description:'Déploiement d\'un réseau de bio-capteurs sur le campus UCAD pour mesurer la sève et la santé des arbres.', statut:'en_cours', axe:{nom:'IoT & Science citoyenne'}, responsable:{nom:'Ndiaye',prenom:'Fatou'}, date_debut:'2023-01-01', date_fin:'2025-12-31', budget:80000 },
  { id:3, titre:'Prédiction spatiale du carbone organique des sols (OSMAN)', description:'Cartographie à haute résolution de la teneur en carbone des sols du bassin arachidier sénégalais.', statut:'en_cours', axe:{nom:'Environnement'}, responsable:{nom:'Sow',prenom:'Moussa'}, date_debut:'2022-06-01', date_fin:'2025-05-31', budget:120000 },
  { id:4, titre:'Système de modélisation cardiaque végétale', description:'Modélisation computationnelle des flux de sève et signaux cardiaques chez les arbres tropicaux.', statut:'planifie', axe:{nom:'Cardiologie'}, responsable:{nom:'Fall',prenom:'Ibra'}, date_debut:'2025-09-01', date_fin:'2028-08-31', budget:95000 },
];

let allProjets = [], activeStatut = '';

function setStatut(s, btn) {
  activeStatut = s;
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function calcProgress(p) {
  if (!p.date_debut || !p.date_fin) return null;
  const s = new Date(p.date_debut), e = new Date(p.date_fin), n = new Date();
  if (n < s) return 0;
  if (n > e) return 100;
  return Math.round(((n - s) / (e - s)) * 100);
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = allProjets.filter(p =>
    (!activeStatut || p.statut === activeStatut) &&
    (!q || p.titre.toLowerCase().includes(q))
  );
  const COLORS = { en_cours:'#059669', planifie:'#2563eb', termine:'#6b7280', suspendu:'#d97706' };
  const grid = document.getElementById('projets-grid');
  if (!filtered.length) { grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;padding:48px;color:var(--c-text3)">Aucun projet trouvé.</p>'; return; }
  grid.innerHTML = filtered.map(p => {
    const color = COLORS[p.statut] || 'var(--c-primary)';
    const prog  = calcProgress(p);
    return `<div class="projet-card" style="border-left-color:${color}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px">
        <div style="font-weight:700;font-size:15px;color:var(--c-primary)">${p.titre}</div>
        <span class="statut-badge s-${p.statut}">${p.statut.replace('_',' ')}</span>
      </div>
      <p style="font-size:13px;color:var(--c-text2);margin-bottom:10px">${truncate(p.description||'',120)}</p>
      <div style="display:flex;gap:16px;font-size:12px;color:var(--c-text3);flex-wrap:wrap">
        <span style="display:flex;align-items:center;gap:4px">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          ${p.responsable?.prenom||''} ${p.responsable?.nom||''}
        </span>
        ${p.axe?`<span style="color:${color};font-weight:600">${p.axe.nom}</span>`:''}
        ${p.budget?`<span>${Number(p.budget).toLocaleString('fr-FR')} FCFA</span>`:''}
      </div>
      ${prog !== null ? `<div class="prog-bar-bg"><div class="prog-bar-fill" data-w="${prog}" style="width:0%;background:${color}"></div></div>` : ''}
    </div>`;
  }).join('');
  setTimeout(() => document.querySelectorAll('.prog-bar-fill').forEach(el => el.style.width = el.dataset.w + '%'), 80);
}

async function load() {
  try { allProjets = await api.get('/projets/?limit=100'); } catch { allProjets = DEMO; }
  document.getElementById('st-total').textContent = allProjets.length;
  document.getElementById('st-cours').textContent = allProjets.filter(p => p.statut === 'en_cours').length;
  document.getElementById('st-plan').textContent  = allProjets.filter(p => p.statut === 'planifie').length;
  document.getElementById('st-fin').textContent   = allProjets.filter(p => p.statut === 'termine').length;
  render();
}
load();
</script>
<script src="../js/i18n.js"></script>
</body>
</html>
