<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — UMMISCO</title>
  <link rel="stylesheet" href="../css/global.css"/>
  <style>
    body { background: var(--c-surface); min-height: 100vh; display: flex; flex-direction: column; }
    .login-topbar {
      background: var(--c-primary);
      height: 36px; display: flex; align-items: center;
    }
    .login-topbar .container { display: flex; justify-content: space-between; width: 100%; }
    .login-topbar span, .login-topbar a { font-size: 12px; color: rgba(255,255,255,.8); }
    .login-topbar a:hover { color: #fff; }
    .login-header {
      background: #fff; border-bottom: 3px solid var(--c-accent);
      padding: 14px 0; box-shadow: var(--shadow-sm);
    }
    .login-header .container { display: flex; align-items: center; gap: 16px; }
    .login-main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .login-wrap { width: 100%; max-width: 420px; }
    .login-card {
      background: #fff;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    .login-card-header {
      background: var(--c-primary);
      padding: 24px;
      text-align: center;
    }
    .login-card-header h1 { color: #fff; font-size: 1.5rem; margin-bottom: 4px; }
    .login-card-header p  { color: rgba(255,255,255,.7); font-size: 13px; }
    .login-card-body { padding: 28px; }
    .eye-btn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--c-text3); font-size: 15px; padding: 4px;
    }
    .input-wrap { position: relative; }
    .input-wrap .form-input { padding-right: 38px; }
    .demo-section { background: var(--c-surface); border-top: 1px solid var(--c-border); padding: 20px 28px; }
    .demo-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--c-text3); margin-bottom: 12px; }
    .demo-btn {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 12px; border-radius: var(--radius-sm);
      background: #fff; border: 1px solid var(--c-border);
      cursor: pointer; transition: all var(--transition);
      font-size: 13px; margin-bottom: 6px;
    }
    .demo-btn:last-child { margin-bottom: 0; }
    .demo-btn:hover { border-color: var(--c-primary); background: var(--c-primary-l); }
    .demo-btn .role-tag { font-size: 11px; font-weight: 700; color: var(--c-primary); font-family: var(--font-mono); }
    .back-link { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--c-text3); margin-bottom: 16px; }
    .back-link:hover { color: var(--c-primary); }
  </style>
</head>
<body>

<div class="login-topbar">
  <div class="container">
    <span>🇸🇳 UMMISCO — Espace membres</span>
    <a href="../index.html">← Retour au portail</a>
  </div>
</div>

<div class="login-header">
  <div class="container" style="gap:12px">
    <a href="../index.html" style="display:flex;align-items:center;gap:12px;text-decoration:none">
      <img src="../images/logo-ucad.png"    alt="UCAD"    style="height:46px;width:auto;object-fit:contain"/>
      <div style="width:1px;height:36px;background:var(--c-border)"></div>
      <img src="../images/logo-ummisco.png" alt="UMMISCO" style="height:46px;width:auto;object-fit:contain;max-width:140px"/>
    </a>
    <div style="width:1px;height:36px;background:var(--c-border)"></div>
    <div>
      <div style="font-family:var(--font-heading);font-size:1.1rem;font-weight:700;color:var(--c-primary)">UMMISCO</div>
      <div style="font-size:11px;color:var(--c-text3)">Portail institutionnel · ESP/UCAD · Dakar</div>
    </div>
  </div>
</div>

<main class="login-main">
  <div class="login-wrap">
    <a href="../index.html" class="back-link">← Retour au portail public</a>

    <div class="login-card">
      <div class="login-card-header">
        <h1>Connexion</h1>
        <p>Accédez à votre espace membres UMMISCO</p>
      </div>

      <div class="login-card-body">
        <div id="alert-area"></div>

        <form id="login-form" class="gap-form">
          <div class="form-group">
            <label class="form-label" for="email">Adresse e-mail</label>
            <input class="form-input" type="email" id="email" placeholder="vous@ucad.sn" required autocomplete="email"/>
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Mot de passe</label>
            <div class="input-wrap">
              <input class="form-input w-full" type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
              <button type="button" class="eye-btn" id="eye-btn" title="Afficher/masquer">👁</button>
            </div>
          </div>
          <button type="submit" class="btn btn--primary w-full" id="submit-btn" style="justify-content:center;margin-top:4px">
            Se connecter
          </button>
        </form>
      </div>

      <div class="demo-section">
        <div class="demo-section-title">Comptes de démonstration</div>
        <div class="demo-btn" onclick="fillDemo('admin@ummisco.ucad.sn','Admin@1234')">
          <span>Super administrateur</span>
          <span class="role-tag">super_admin</span>
        </div>
        <div class="demo-btn" onclick="fillDemo('chercheur@ummisco.ucad.sn','Demo@1234')">
          <span>Chercheur</span>
          <span class="role-tag">chercheur</span>
        </div>
        <div class="demo-btn" onclick="fillDemo('doctorant@ummisco.ucad.sn','Demo@1234')">
          <span>Doctorant</span>
          <span class="role-tag">doctorant</span>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="../js/api.js"></script>
<script>
redirectIfAuth();

document.getElementById('eye-btn').onclick = function() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  this.textContent = inp.type === 'password' ? '👁' : '🙈';
};

function fillDemo(email, pwd) {
  document.getElementById('email').value = email;
  document.getElementById('password').value = pwd;
}

function showAlert(msg, type='error') {
  const icons = { error:'⚠', success:'✓', info:'ℹ' };
  document.getElementById('alert-area').innerHTML =
    `<div class="alert alert--${type}" style="margin-bottom:16px">${icons[type]} ${msg}</div>`;
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:14px;height:14px;border-width:2px"></div> Connexion…';
  document.getElementById('alert-area').innerHTML = '';
  try {
    const tokens = await api.post('/auth/login', { email, password });
    Auth.setTokens(tokens.access_token, tokens.refresh_token);
    const user = await api.get('/auth/me');
    Auth.setUser(user);
    showAlert(`Bienvenue, ${user.prenom} ${user.nom} !`, 'success');
    setTimeout(() => { window.location.href = 'admin/dashboard.html'; }, 700);
  } catch(err) {
    showAlert(err.message || 'Identifiants invalides');
    btn.disabled = false;
    btn.textContent = 'Se connecter';
  }
});
</script>
</body>
</html>
