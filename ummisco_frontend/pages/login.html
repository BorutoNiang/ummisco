<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — UMMISCO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      background: #e8f0f7;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .login-wrap { width: 100%; max-width: 380px; }

    .back-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600; color: #888;
      text-decoration: none; margin-bottom: 24px;
      transition: color .15s;
    }
    .back-link:hover { color: #2a7abf; }

    .login-title { font-size: 1.6rem; font-weight: 700; color: #111; margin-bottom: 4px; }
    .login-sub   { font-size: 13px; color: #888; margin-bottom: 24px; }

    .alert {
      padding: 11px 14px; border-radius: 10px;
      font-size: 13px; margin-bottom: 20px;
      display: flex; align-items: center; gap: 8px;
    }
    .alert--error   { background: #fff1f1; color: #c0392b; border: 1px solid #fcc; }
    .alert--success { background: #f0faf4; color: #1a7a45; border: 1px solid #b2dfcc; }

    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block; font-size: 13px; font-weight: 600;
      color: #333; margin-bottom: 8px;
    }
    .form-input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #dce3ed; border-radius: 10px;
      font-size: 13px; font-family: inherit; color: #222;
      background: #fff; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-input:focus {
      border-color: #2a7abf;
      box-shadow: 0 0 0 3px rgba(42,122,191,.12);
    }
    .input-wrap { position: relative; }
    .input-wrap .form-input { padding-right: 44px; }
    .eye-btn {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: #aaa; font-size: 17px; padding: 2px;
      transition: color .15s;
    }
    .eye-btn:hover { color: #2a7abf; }

    .btn-submit {
      width: 100%; padding: 12px;
      background: #2a7abf; color: #fff;
      border: none; border-radius: 10px;
      font-size: 13px; font-weight: 700;
      font-family: inherit; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .15s;
    }
    .btn-submit:hover:not(:disabled) { background: #1a5f9a; }
    .btn-submit:disabled { opacity: .65; cursor: not-allowed; }

    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .demo-section {
      margin-top: 28px;
      border: 1px solid #dce3ed;
      border-radius: 14px;
      background: #fff;
      overflow: hidden;
    }
    .demo-header {
      padding: 13px 18px;
      background: #f4f8fc;
      border-bottom: 1px solid #dce3ed;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em; color: #999;
    }
    .demo-btn {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; cursor: pointer;
      border-bottom: 1px solid #f0f3f7;
      transition: background .12s;
    }
    .demo-btn:last-child { border-bottom: none; }
    .demo-btn:hover { background: #f0f6ff; }
    .demo-name  { font-size: 14px; font-weight: 700; color: #111; margin-bottom: 2px; }
    .demo-email { font-size: 12px; color: #999; }
    .role-tag {
      font-size: 11px; font-weight: 700;
      font-family: 'Courier New', monospace;
      padding: 4px 10px; border-radius: 6px;
      white-space: nowrap;
    }
    .role-tag--admin  { background: #eef4ff; color: #2a7abf; }
    .role-tag--search { background: #f0faf4; color: #1a7a45; }
    .role-tag--doc    { background: #fdf6ec; color: #b96a00; }
  </style>
</head>
<body>

<div class="login-wrap">

  <a href="../index.html" class="back-link">← Retour à l'accueil</a>

  <h1 class="login-title">Connexion</h1>
  <p class="login-sub">Accédez à votre espace membres UMMISCO</p>

  <div id="alert-area"></div>

  <form id="login-form">
    <div class="form-group">
      <label class="form-label" for="email">Adresse e-mail</label>
      <input class="form-input" type="email" id="email" placeholder="vous@ucad.sn" required autocomplete="email"/>
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Mot de passe</label>
      <div class="input-wrap">
        <input class="form-input" type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
        <button type="button" class="eye-btn" id="eye-btn" title="Afficher/masquer">👁</button>
      </div>
    </div>
    <button type="submit" class="btn-submit" id="submit-btn">Se connecter</button>
  </form>

  <div class="demo-section">
    <div class="demo-header">Comptes de démonstration</div>
    <div class="demo-btn" onclick="fillDemo('admin@ummisco.ucad.sn','Admin@1234')">
      <div>
        <div class="demo-name">Directeur</div>
        <div class="demo-email">admin@ummisco.ucad.sn</div>
      </div>
      <span class="role-tag role-tag--admin">directeur</span>
    </div>
    <div class="demo-btn" onclick="fillDemo('chercheur@ummisco.ucad.sn','Demo@1234')">
      <div>
        <div class="demo-name">Chercheur</div>
        <div class="demo-email">chercheur@ummisco.ucad.sn</div>
      </div>
      <span class="role-tag role-tag--search">chercheur</span>
    </div>
    <div class="demo-btn" onclick="fillDemo('doctorant@ummisco.ucad.sn','Demo@1234')">
      <div>
        <div class="demo-name">Doctorant</div>
        <div class="demo-email">doctorant@ummisco.ucad.sn</div>
      </div>
      <span class="role-tag role-tag--doc">doctorant</span>
    </div>
  </div>

</div>

<script src="../js/api.js"></script>
<script>
redirectIfAuth();

document.getElementById('eye-btn').onclick = function() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  this.textContent = inp.type === 'password' ? '👁' : '🙈';
};

function fillDemo(email, pwd) {
  document.getElementById('email').value = email;
  document.getElementById('password').value = pwd;
}

function showAlert(msg, type = 'error') {
  const icons = { error: '⚠', success: '✓', info: 'ℹ' };
  document.getElementById('alert-area').innerHTML =
    `<div class="alert alert--${type}">${icons[type]} ${msg}</div>`;
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Connexion…';
  document.getElementById('alert-area').innerHTML = '';
  try {
    const tokens = await api.post('/auth/login', { email, password });
    Auth.setTokens(tokens.access_token, tokens.refresh_token);
    const user = await api.get('/auth/me');
    Auth.setUser(user);
    showAlert(`Bienvenue, ${user.prenom} ${user.nom} !`, 'success');
    setTimeout(() => { window.location.href = 'admin/dashboard.html'; }, 700);
  } catch (err) {
    showAlert(err.message || 'Identifiants invalides');
    btn.disabled = false;
    btn.textContent = 'Se connecter';
  }
});
</script>
</body>
</html>
