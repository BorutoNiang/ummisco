<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — UMMISCO</title>
  <link rel="stylesheet" href="../css/global.css"/>
</head>
<body>
<div class="page-header-inst">
  <div class="container">
    <h1 data-i18n="page.contact.title">Contact</h1>
    <p>Nous contacter · ESP/UCAD · Dakar, Sénégal</p>
  </div>
</div>
<div style="padding:48px 0">
  <div class="container">
    <div class="grid-2" style="gap:40px;align-items:start">
      <div>
        <div class="section-title" style="margin-bottom:20px">
          <div class="section-title-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.18 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9a16 16 0 0 0 6.29 6.29l.87-.87a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </div>
          <h2>Nous contacter</h2>
          <div class="section-title-bar"></div>
        </div>

        <div style="display:flex;flex-direction:column;gap:20px">
          <div class="card" style="flex-direction:row;display:flex;align-items:flex-start;gap:14px">
            <div style="width:40px;height:40px;background:var(--c-primary-l);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--c-primary)" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <div>
              <div style="font-weight:600;color:var(--c-primary);margin-bottom:6px">Adresse</div>
              <div style="font-size:14px;color:var(--c-text2);line-height:1.7">
                <strong>UMMISCO - UCAD</strong><br>
                Campus UCAD — Dakar Fann<br>
                Campus UCAD-IRD — Dakar Hann Maristes<br>
                Dakar, Sénégal
              </div>
            </div>
          </div>
          <div class="card" style="flex-direction:row;display:flex;align-items:center;gap:14px">
            <div style="width:40px;height:40px;background:var(--c-primary-l);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--c-primary)" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
            <div>
              <div style="font-weight:600;color:var(--c-primary);margin-bottom:2px">Email</div>
              <a href="mailto:ummisco@ucad.edu.sn" style="font-size:14px;color:var(--c-primary)">ummisco@ucad.edu.sn</a>
            </div>
          </div>
        </div>
      </div>

      <div>
        <div class="card">
          <h3 style="color:var(--c-primary);margin-bottom:20px">Envoyer un message</h3>
          <form class="gap-form" onsubmit="event.preventDefault();alert('Message envoyé. Nous vous répondrons dans les plus brefs délais.')">
            <div class="grid-2">
              <div class="form-group"><label class="form-label">Prénom</label><input class="form-input" placeholder="Votre prénom" required/></div>
              <div class="form-group"><label class="form-label">Nom</label><input class="form-input" placeholder="Votre nom" required/></div>
            </div>
            <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" placeholder="votre@email.com" required/></div>
            <div class="form-group"><label class="form-label">Sujet</label><input class="form-input" placeholder="Sujet de votre message"/></div>
            <div class="form-group"><label class="form-label">Message</label><textarea class="form-input" rows="5" placeholder="Votre message…" required></textarea></div>
            <button type="submit" class="btn btn--primary" style="align-self:flex-end">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              Envoyer
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../js/api.js"></script>
<script src="../js/nav.js"></script>
<script>initNav({ active:'contact', base:'../' }); initFooter({ base:'../' });</script>
<script src="../js/i18n.js"></script>
</body>
</html>
